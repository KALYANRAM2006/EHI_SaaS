# Demo Deployment — Azure Static Web Apps CI/CD
#
# Triggers ONLY on the `demo` branch.
# Builds with VITE_DEMO=true and VITE_DEMO_EXPIRY set in the workflow.
# Deploys to a SEPARATE Azure Static Web App (demo instance).
#
# To push tested features from main → demo, run:
#   scripts/push-to-demo.ps1 -ExpiryDate "2026-04-15"

name: Demo Deployment

on:
  push:
    branches:
      - demo
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - demo

env:
  # Default expiry: 30 days from now (can be overridden per-push via commit message tag)
  DEMO_EXPIRY_DAYS: 30

jobs:
  build_and_deploy_demo:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Demo
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false

      - name: Determine expiry date
        id: expiry
        run: |
          # Check if VITE_DEMO_EXPIRY is set in the commit message (format: [expiry:YYYY-MM-DD])
          COMMIT_EXPIRY=$(git log -1 --pretty=%B | grep -oP '\[expiry:\K[0-9-]+' || true)
          if [ -n "$COMMIT_EXPIRY" ]; then
            echo "date=$COMMIT_EXPIRY" >> $GITHUB_OUTPUT
            echo "Using commit-specified expiry: $COMMIT_EXPIRY"
          else
            # Default: DEMO_EXPIRY_DAYS from now
            EXPIRY=$(date -d "+${{ env.DEMO_EXPIRY_DAYS }} days" +%Y-%m-%d)
            echo "date=$EXPIRY" >> $GITHUB_OUTPUT
            echo "Using default expiry (${{ env.DEMO_EXPIRY_DAYS }} days): $EXPIRY"
          fi

      - name: Deploy to Azure Static Web Apps (Demo)
        uses: Azure/static-web-apps-deploy@v1
        with:
          # Separate Azure Static Web App for demo
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_DEMO }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "frontend"
          api_location: ""
          output_location: "dist"
          skip_app_build: false
          production_branch: "demo"
          app_build_command: "npx vite build"
        env:
          VITE_DEMO: 'true'
          VITE_DEMO_EXPIRY: ${{ steps.expiry.outputs.date }}
          VITE_BUILD_DATE: ${{ github.event.head_commit.timestamp }}

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_DEMO }}
          action: "close"
